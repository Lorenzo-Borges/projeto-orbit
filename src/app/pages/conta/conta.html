<div class="conta-container">
    <h2>Conta</h2>

    <div class="config-card">

        <div class="config-item">
            <div class="config-info">
                <label>Minhas conquistas</label>
                <p>Veja seu progresso e os marcos já alcançados.</p>
            </div>

            <a routerLink="/conquistas" class="btn-link">
                Ver todas
            </a>
        </div>

        <div class="config-item">
            <div class="config-info">
                <label>Nome de usuário</label>
                <span class="config-value">jorge</span>
            </div>

            <button class="btn-config">
                Alterar nome
            </button>
        </div>

        <div class="config-item">
            <div class="config-info">
                <label>E-mail</label>
                <span class="config-value">indiano@gmail.com</span>
            </div>
        </div>

        <div class="config-item">
            <div class="config-info">
                <label>Senha</label>
                <span class="config-value">••••••••</span>
            </div>

            <button class="btn-config">
                Alterar senha
            </button>
        </div>

        <div class="config-item danger">
            <div class="config-info">
                <label>Sair da conta</label>
                <p>Encerrar sua sessão atual.</p>
            </div>

            <button class="btn-danger">
                Sair
            </button>
        </div>

    </div>
</div>
