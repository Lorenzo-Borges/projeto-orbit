<div class="tarefas-container">

    <h2>Gerenciamento de Tarefas</h2>

    <form class="formulario-tarefas">

        <h3>Cadastrar Nova Tarefa</h3>

        <div class="campo">
            <label for="tarefa">Tarefa</label>
            <input
                id="tarefa"
                type="text"
                placeholder="Digite a tarefa"
                [(ngModel)]="tarefa"
                [ngModelOptions]="{standalone: true}"
            >
        </div>

        <div class="campo">
            <label for="limite-data">Data Limite</label>
            <input
                id="limite-data"
                type="date"
                 [(ngModel)]="dataLimite"
                 [ngModelOptions]="{standalone: true}"
            >
        </div>

        <div class="campo">
            <label for="status">Status</label>
            <select id="status" [(ngModel)]="statu"
            [ngModelOptions]="{standalone: true}">
                <option value="pendente">Pendente</option>
                <option value="andamento">Em andamento</option>
                <option value="concluida">Concluída</option>
            </select>
        </div>

        <button (click)="salvar()" type="submit">
            Adicionar Tarefa
        </button>

    </form>

    <hr>

    <div class="lista-tarefas">

        <h3>Minhas Tarefas</h3>

        <ul>

            <li class="item-tarefa">

                <div class="info-tarefa">
                    <strong>Lavar louça</strong>
                    <p>Data limite: 12/08/2026</p>
                    <span class="status pendente">
                        Pendente
                    </span>
                </div>

                <div class="acoes-tarefa">
                    <button>Editar</button>
                    <button>Excluir</button>
                </div>
            </li>

                @for(tarefa of tarefas; let i = $index; track tarefas){
                    <li class="item-tarefa">

                <div class="info-tarefa">
                    <strong>{{tarefas[i]}}</strong>
                    <p>Data limite: {{datasLimites[i]}}</p>
                    <span class="status {{status[i]}}">
                        {{status[i]}}
                    </span>
                </div>

                <div class="acoes-tarefa">
                    <button (click)="preencherParaEditar(tarefa, datasLimites[i],status[i])">Editar</button>
                    <button (click)="apagar(tarefa)">Excluir</button>
                </div>
            </li>

                }

            

        </ul>

    </div>

</div>
