<div class="acessibilidade-container">
    <h2>Acessibilidade</h2>

    <div class="config-card">

        <div class="config-item">
            <div class="config-info">
                <label for="fonte">Tamanho da fonte</label>
                <p>Escolha o tamanho ideal para melhorar a leitura.</p>
            </div>

            <select id="fonte">
                <option value="pequena">Pequena</option>
                <option value="media" selected>Média</option>
                <option value="grande">Grande</option>
            </select>
        </div>

        <div class="config-item">
            <div class="config-info">
                <label for="alto-contraste">Alto contraste</label>
                <p>Aumenta o contraste das cores para facilitar a visualização.</p>
            </div>

            <button id="alto-contraste" class="btn-config">
                Ativar
            </button>
        </div>

    </div>
</div>
